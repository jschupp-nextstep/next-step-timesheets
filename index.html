<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Next Step Timesheets</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', (e) => {
        document.getElementById('root').innerText = 'Boot error: ' + (e.error?.stack || e.message)
      })
      window.addEventListener('unhandledrejection', (e) => {
        document.getElementById('root').innerText = 'Boot rejection: ' + (e.reason?.stack || e.reason)
      })
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
